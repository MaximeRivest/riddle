name: Riddle
options:
  bundleIdPrefix: com.riddle
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
targets:
  Riddle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Riddle
    resources:
      - path: Riddle/Resources
    info:
      path: Info.plist
      properties:
        CFBundleName: Riddle
        CFBundleDisplayName: The Diary
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresPersistentWiFi: false
        ITSAppUsesNonExemptEncryption: false
        NSApplePencilUsageDescription: The diary needs Apple Pencil input for handwriting.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mixun.riddle-diary
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 2WACGSQ4Q3
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
